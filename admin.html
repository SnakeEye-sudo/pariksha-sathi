<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Panel — ParikshaSathi</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.login-card,.dashboard{background:white;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:1200px;width:100%}.login-card{max-width:400px}h1{color:#667eea;margin-bottom:10px;font-size:28px}h2{color:#333;margin-bottom:20px;font-size:20px}input{width:100%;padding:15px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:20px;transition:.3s}input:focus{outline:none;border-color:#667eea}.btn{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;transition:.3s}.btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(102,126,234,0.3)}.error{color:#e74c3c;margin-bottom:15px;font-size:14px}.hidden{display:none!important}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}.stat-card{background:linear-gradient(135deg,#667eea,#764ba2);padding:25px;border-radius:15px;color:white}.stat-card h3{font-size:16px;opacity:0.9;margin-bottom:10px}.stat-card .number{font-size:36px;font-weight:700}.users-table{overflow-x:auto;margin-top:20px}table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden}th{background:#667eea;color:white;padding:15px;text-align:left}td{padding:15px;border-bottom:1px solid #f0f0f0}tr:hover{background:#f8f9fa}.badge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}.badge-active{background:#27ae60;color:white}.badge-inactive{background:#95a5a6;color:white}.logout-btn{margin-top:20px;background:#e74c3c}</style></head><body><div class="login-card" id="loginCard"><h1>🔐 Admin Panel</h1><h2>ParikshaSathi</h2><div class="error hidden" id="errorMsg"></div><input type="password" id="password" placeholder="Enter Admin Password" onkeypress="if(event.key==='Enter')login()"><button class="btn" onclick="login()">Login</button></div><div class="dashboard hidden" id="dashboard"><h1>📊 Admin Dashboard</h1><h2>ParikshaSathi Analytics</h2><div class="stats"><div class="stat-card"><h3>Total Users</h3><div class="number" id="totalUsers">-</div></div><div class="stat-card"><h3>Active Today</h3><div class="number" id="activeToday">-</div></div><div class="stat-card"><h3>Total Progress Saved</h3><div class="number" id="totalProgress">-</div></div><div class="stat-card"><h3>Avg Study Hours</h3><div class="number" id="avgHours">-</div></div></div><div class="users-table"><h2>User Details</h2><table id="usersTable"><thead><tr><th>Name</th><th>Email</th><th>Last Login</th><th>Study Plan</th><th>Progress</th><th>Status</th></tr></thead><tbody id="usersBody"><tr><td colspan="6" style="text-align:center;padding:30px;color:#999">Loading data...</td></tr></tbody></table></div><button class="btn logout-btn" onclick="logout()">Logout</button></div><script type="module">import{initializeApp}from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';import{getAuth}from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';import{getFirestore,collection,getDocs,query,orderBy}from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';const firebaseConfig={apiKey:"AIzaSyC6Cpg83N8fBuvY7YOSwTWsfM9DUsaVc3E",authDomain:"pariksha-sathi.firebaseapp.com",projectId:"pariksha-sathi",storageBucket:"pariksha-sathi.firebasestorage.app",messagingSenderId:"921721697043",appId:"1:921721697043:web:dada90a420c40e11ae60e6",measurementId:"G-NC7955J7KV"};const app=initializeApp(firebaseConfig);const db=getFirestore(app);window.adminAuth=false;window.login=()=>{const pwd=document.getElementById('password').value;const err=document.getElementById('errorMsg');if(pwd==='Sangeeta@1221'){window.adminAuth=true;document.getElementById('loginCard').classList.add('hidden');document.getElementById('dashboard').classList.remove('hidden');loadDashboard()}else{err.textContent='❌ Incorrect password!';err.classList.remove('hidden');document.getElementById('password').value=''}};window.logout=()=>{window.adminAuth=false;document.getElementById('loginCard').classList.remove('hidden');document.getElementById('dashboard').classList.add('hidden');document.getElementById('password').value=''};async function loadDashboard(){try{const usersRef=collection(db,'users');const q=query(usersRef,orderBy('lastLogin','desc'));const snapshot=await getDocs(q);const users=[];const today=new Date().toDateString();let activeToday=0;let totalProgress=0;snapshot.forEach(doc=>{const data=doc.data();users.push({id:doc.id,...data});if(data.lastLogin&&new Date(data.lastLogin).toDateString()===today){activeToday++}});document.getElementById('totalUsers').textContent=users.length;document.getElementById('activeToday').textContent=activeToday;for(const user of users){try{const progressRef=collection(db,'users',user.id,'progress');const progSnap=await getDocs(progressRef);if(!progSnap.empty){totalProgress++}}catch(e){}}document.getElementById('totalProgress').textContent=totalProgress;const avgHours=users.reduce((sum,u)=>sum+(u.studyHours||0),0)/users.length||0;document.getElementById('avgHours').textContent=avgHours.toFixed(1)+'h';const tbody=document.getElementById('usersBody');tbody.innerHTML='';users.forEach(user=>{const row=document.createElement('tr');const lastLogin=user.lastLogin?new Date(user.lastLogin).toLocaleString('en-IN'):'Never';const isActive=user.lastLogin&&new Date(user.lastLogin).toDateString()===today;const planInfo=user.exam?`${user.exam}`:'-';const progressInfo=user.studyHours?`${user.studyHours}h/day`:'-';row.innerHTML=`<td>${user.name||'Anonymous'}</td><td>${user.email||'-'}</td><td>${lastLogin}</td><td>${planInfo}</td><td>${progressInfo}</td><td><span class="badge ${isActive?'badge-active':'badge-inactive'}">${isActive?'Active':'Inactive'}</span></td>`;tbody.appendChild(row)})}catch(e){console.error(e);document.getElementById('usersBody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:30px;color:#e74c3c">Error loading data: '+e.message+'</td></tr>'}}</script></body></html>
